name: Update Weekly Silo Codes

on:
  schedule:
    - cron: '15 21 * * 2'
    - cron: '15 0 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --use-system-ca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update silo code data
        run: node scripts/update-silo-codes.mjs

      - name: Commit updated silo codes
        run: |
          if git diff --quiet -- public/wasteland-companion-guide-app/weekly-silo-codes/silo-codes.json; then
            echo "No silo code changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/wasteland-companion-guide-app/weekly-silo-codes/silo-codes.json
          git commit -m "Update weekly silo codes"
          git push
